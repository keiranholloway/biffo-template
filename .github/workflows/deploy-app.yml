name: Deploy Application

on:
  push:
    branches: [dev, staging, main]
    paths:
      - 'apps/**'
      - 'services/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '22'

# Deploy jobs only run in repos where BIFFO_DEPLOY_ENABLED=true has been set.
# The template repo itself has this unset, so all jobs are skipped there.

# ─── DEV ─────────────────────────────────────────────────────────────────────

jobs:
  build-dev:
    name: Build (dev)
    runs-on: ubuntu-latest
    environment: dev
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/dev') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev'))
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - name: Build portal
        env:
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          NEXT_PUBLIC_API_URL: ${{ vars.API_GATEWAY_URL }}
        run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: portal-build-dev
          path: apps/portal/out/
      - uses: actions/upload-artifact@v4
        with:
          name: api-service-dev
          path: services/api/

  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: build-dev
    environment: dev
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: actions/download-artifact@v4
        with:
          name: portal-build-dev
          path: portal-dist/
      - name: Sync portal to S3
        run: |
          aws s3 sync portal-dist/ s3://${{ vars.PORTAL_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync portal-dist/ s3://${{ vars.PORTAL_BUCKET_NAME }}/ \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
      - uses: actions/download-artifact@v4
        with:
          name: api-service-dev
          path: api-service/
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'
      - name: Package and deploy Lambda
        working-directory: api-service
        run: |
          uv export --no-dev --output-file requirements.txt
          uv pip install -r requirements.txt --target package/
          cp -r src/ package/
          cp -r migrations/ package/
          cp alembic.ini package/
          cd package && zip -r ../lambda.zip .
          aws lambda update-function-code \
            --function-name ${{ vars.CORE_API_LAMBDA_NAME }} \
            --zip-file fileb://../lambda.zip
      - name: Initialise database schema
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.CORE_API_LAMBDA_NAME }}
          RESULT=$(aws lambda invoke \
            --function-name ${{ vars.CORE_API_LAMBDA_NAME }} \
            --payload '{"source":"biffo:db-init"}' \
            --cli-binary-format raw-in-base64-out \
            db-init-response.json)
          if echo "$RESULT" | grep -q FunctionError; then
            echo "Schema init failed:" && cat db-init-response.json && exit 1
          fi

  # ─── STAGING ─────────────────────────────────────────────────────────────────
  # Manual only — run workflow_dispatch with environment=staging.

  build-staging:
    name: Build (staging)
    runs-on: ubuntu-latest
    environment: staging
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/staging') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'))
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - name: Build portal
        env:
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          NEXT_PUBLIC_API_URL: ${{ vars.API_GATEWAY_URL }}
        run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: portal-build-staging
          path: apps/portal/out/
      - uses: actions/upload-artifact@v4
        with:
          name: api-service-staging
          path: services/api/

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-staging
    environment: staging
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: actions/download-artifact@v4
        with:
          name: portal-build-staging
          path: portal-dist/
      - name: Sync portal to S3
        run: |
          aws s3 sync portal-dist/ s3://${{ vars.PORTAL_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync portal-dist/ s3://${{ vars.PORTAL_BUCKET_NAME }}/ \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
      - uses: actions/download-artifact@v4
        with:
          name: api-service-staging
          path: api-service/
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'
      - name: Package and deploy Lambda
        working-directory: api-service
        run: |
          uv export --no-dev --output-file requirements.txt
          uv pip install -r requirements.txt --target package/
          cp -r src/ package/
          cp -r migrations/ package/
          cp alembic.ini package/
          cd package && zip -r ../lambda.zip .
          aws lambda update-function-code \
            --function-name ${{ vars.CORE_API_LAMBDA_NAME }} \
            --zip-file fileb://../lambda.zip
      - name: Initialise database schema
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.CORE_API_LAMBDA_NAME }}
          RESULT=$(aws lambda invoke \
            --function-name ${{ vars.CORE_API_LAMBDA_NAME }} \
            --payload '{"source":"biffo:db-init"}' \
            --cli-binary-format raw-in-base64-out \
            db-init-response.json)
          if echo "$RESULT" | grep -q FunctionError; then
            echo "Schema init failed:" && cat db-init-response.json && exit 1
          fi

  # ─── PROD ────────────────────────────────────────────────────────────────────
  # Manual only — run workflow_dispatch with environment=prod.
  # Requires prod environment approval in GitHub Settings → Environments.

  build-prod:
    name: Build (prod)
    runs-on: ubuntu-latest
    environment: prod
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'))
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - name: Build portal
        env:
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          NEXT_PUBLIC_API_URL: ${{ vars.API_GATEWAY_URL }}
        run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: portal-build-prod
          path: apps/portal/out/
      - uses: actions/upload-artifact@v4
        with:
          name: api-service-prod
          path: services/api/

  deploy-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: build-prod
    environment: prod
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: actions/download-artifact@v4
        with:
          name: portal-build-prod
          path: portal-dist/
      - name: Sync portal to S3
        run: |
          aws s3 sync portal-dist/ s3://${{ vars.PORTAL_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync portal-dist/ s3://${{ vars.PORTAL_BUCKET_NAME }}/ \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
      - uses: actions/download-artifact@v4
        with:
          name: api-service-prod
          path: api-service/
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'
      - name: Package and deploy Lambda
        working-directory: api-service
        run: |
          uv export --no-dev --output-file requirements.txt
          uv pip install -r requirements.txt --target package/
          cp -r src/ package/
