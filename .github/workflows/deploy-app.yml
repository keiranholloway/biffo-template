name: Deploy Application

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "services/**"
      - "packages/**"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: portal-build
          path: apps/portal/out/
      - uses: actions/upload-artifact@v4
        with:
          name: api-service
          path: services/api/

  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: actions/download-artifact@v4
        with:
          name: portal-build
          path: portal-dist/
      - name: Sync portal to S3
        run: |
          aws s3 sync portal-dist/ s3://${{ vars.PORTAL_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 sync portal-dist/ s3://${{ vars.PORTAL_BUCKET_NAME }}/ \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
      - uses: actions/download-artifact@v4
        with:
          name: api-service
          path: api-service/
      - uses: astral-sh/setup-uv@v5
      - name: Package and deploy Lambda
        working-directory: api-service
        run: |
          uv export --no-dev --output-file requirements.txt
          pip install -r requirements.txt -t package/
          cp -r src/ package/
          cd package && zip -r ../lambda.zip .
          aws lambda update-function-code \
            --function-name ${{ vars.CORE_API_LAMBDA_NAME }} \
            --zip-file fileb://../lambda.zip
