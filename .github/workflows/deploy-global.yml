name: Deploy Global Infrastructure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/global/**'

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: '~> 1.9'

# Provisions shared infrastructure that all environments depend on:
#   - Route 53 hosted zone for the project domain
#   - Wildcard ACM certificate (*.domain + domain) in us-east-1 for CloudFront
# Assumes the domain is registered in Route 53 in the same AWS account.
#
# The hosted zone is applied and its NS records delegated to the registered
# domain BEFORE the ACM certificate is requested. DNS validation for the
# certificate depends on those NS records resolving publicly — requesting
# the cert first (delegating after) leaves aws_acm_certificate_validation
# waiting on DNS that can never resolve, and the job hangs until the
# workflow timeout.

jobs:
  deploy-global:
    name: Deploy global (Route 53 + ACM)
    runs-on: ubuntu-latest
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && vars.DOMAIN != ''
    defaults:
      run:
        working-directory: infra/global
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: us-east-1
          # aws_acm_certificate_validation (in the "Apply certificate" step) waits
          # out however long DNS delegation takes to propagate, which can be tens
          # of minutes — the default 1h STS session isn't reliable headroom on top
          # of the terraform applies. Requires the OIDC role's max_session_duration
          # to allow it (see cli/src/adapters/cloud/aws/index.ts setupOidcTrust).
          role-duration-seconds: 7200
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "global/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - name: Adopt existing hosted zone instead of recreating it
        run: |
          DOMAIN="${{ vars.DOMAIN }}"
          if terraform state list | grep -qx 'aws_route53_zone.main'; then
            echo "Zone already tracked in state — nothing to do."
            exit 0
          fi
          ZONE_IDS=$(aws route53 list-hosted-zones-by-name \
            --dns-name "${DOMAIN}." \
            --query "HostedZones[?Name=='${DOMAIN}.'].Id" \
            --output text | tr '\t' '\n' | cut -d/ -f3 | grep -v '^$')
          ZONE_COUNT=$(echo "$ZONE_IDS" | grep -c '.' || true)
          if [ "$ZONE_COUNT" -eq 0 ]; then
            echo "No existing zone found for $DOMAIN — creating fresh."
          elif [ "$ZONE_COUNT" -gt 1 ]; then
            echo "::error::Found $ZONE_COUNT hosted zones for $DOMAIN — cannot decide which to adopt. Delete the extras manually before retrying."
            echo "Orphaned zones: $ZONE_IDS"
            exit 1
          else
            ZONE_ID="$ZONE_IDS"
            echo "Found untracked existing zone $ZONE_ID for $DOMAIN — importing it instead of deleting and recreating."
            echo "Deleting and recreating would incur a duplicate Route 53 monthly zone charge and open a DNS resolution gap until the new NS records propagate to the registrar."
            terraform import aws_route53_zone.main "$ZONE_ID"
          fi
      - name: Adopt existing ACM certificate instead of recreating it
        run: |
          DOMAIN="${{ vars.DOMAIN }}"
          if terraform state list | grep -qx 'aws_acm_certificate.wildcard'; then
            echo "ACM certificate already tracked in state — nothing to do."
            exit 0
          fi
          CERT_ARNS=$(aws acm list-certificates --region us-east-1 \
            --query "CertificateSummaryList[?DomainName=='${DOMAIN}' || DomainName=='*.${DOMAIN}'].CertificateArn" \
            --output text | tr '\t' '\n' | grep -v '^$')
          CERT_COUNT=$(echo "$CERT_ARNS" | grep -c '.' || true)
          if [ "$CERT_COUNT" -eq 0 ]; then
            echo "No existing ACM certificate found for $DOMAIN — creating fresh."
          elif [ "$CERT_COUNT" -gt 1 ]; then
            echo "::error::Found $CERT_COUNT ACM certificates for $DOMAIN — cannot decide which to adopt. Delete the extras manually before retrying."
            echo "Orphaned certificates: $CERT_ARNS"
            exit 1
          else
            CERT_ARN="$CERT_ARNS"
            echo "Found untracked existing ACM certificate $CERT_ARN for $DOMAIN — importing it instead of creating a new one."
            terraform import aws_acm_certificate.wildcard "$CERT_ARN"
          fi
      - name: Apply hosted zone
        run: terraform apply -auto-approve -target=aws_route53_zone.main
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_domain: ${{ vars.DOMAIN }}
      - name: Delegate domain to hosted zone
        run: |
          DOMAIN="${{ vars.DOMAIN }}"
          ZONE_ID=$(terraform output -raw hosted_zone_id)

          # Update the Route 53 registered domain's NS records to match the hosted
          # zone BEFORE requesting the ACM certificate. Requires the domain to be
          # registered in Route 53 in this same AWS account.
          NS_LIST=$(aws route53 list-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --query 'ResourceRecordSets[?Type==`NS`].ResourceRecords[].Value' \
            --output text | tr '\t' '\n' | sed 's/\.$//')
          NS_ARGS=$(echo "$NS_LIST" | awk '{print "Name="$1}' | tr '\n' ' ')

          CURRENT_NS=$(aws route53domains get-domain-detail \
            --region us-east-1 \
            --domain-name "$DOMAIN" \
            --query 'Nameservers[].Name' --output text | tr '\t' '\n' | sort | tr '\n' ' ' | sed 's/ $//')
          TARGET_NS=$(echo "$NS_LIST" | sort | tr '\n' ' ' | sed 's/ $//')

          if [ "$CURRENT_NS" = "$TARGET_NS" ]; then
            echo "Registered domain already delegated to this zone — skipping update."
            exit 0
          fi

          echo "Delegating $DOMAIN to zone $ZONE_ID: $NS_LIST"
          OPERATION_ID=$(aws route53domains update-domain-nameservers \
            --region us-east-1 \
            --domain-name "$DOMAIN" \
            --nameservers $NS_ARGS \
            --query 'OperationId' --output text)

          # This confirms the registrar-side update request itself succeeded (wrong
          # permissions, domain not registered via Route 53, etc. surface here in
          # seconds) — it does not wait for public DNS propagation. That's the same
          # DNS lag aws_acm_certificate_validation already tolerates via its own
          # retry/timeout in the next step, so there's no need to duplicate that
          # wait here against an arbitrary timeout.
          for i in $(seq 1 12); do
            STATUS=$(aws route53domains get-operation-detail \
              --region us-east-1 --operation-id "$OPERATION_ID" --query 'Status' --output text)
            case "$STATUS" in
              SUCCESSFUL) echo "Nameserver update accepted."; exit 0 ;;
              FAILED|ERROR) echo "::error::Nameserver update $STATUS for $DOMAIN (operation $OPERATION_ID)."; exit 1 ;;
            esac
            sleep 5
          done

          echo "::error::Nameserver update for $DOMAIN (operation $OPERATION_ID) did not reach a terminal status within 60s."
          exit 1
      - name: Apply certificate
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_domain: ${{ vars.DOMAIN }}
      - name: Export outputs
        env:
          GH_TOKEN: ${{ secrets.BIFFO_GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ACM_ARN=$(terraform output -raw acm_certificate_arn)
          ZONE_ID=$(terraform output -raw hosted_zone_id)

          gh variable set ACM_CERTIFICATE_ARN --body "$ACM_ARN"
          gh variable set HOSTED_ZONE_ID --body "$ZONE_ID"

          echo "## Global infrastructure deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ACM Certificate ARN: \`$ACM_ARN\`" >> $GITHUB_STEP_SUMMARY
          echo "Hosted Zone ID: \`$ZONE_ID\`" >> $GITHUB_STEP_SUMMARY
