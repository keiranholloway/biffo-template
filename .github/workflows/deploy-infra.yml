name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: Terraform action
        required: true
        type: choice
        options: [plan, apply]
        default: plan

env:
  TERRAFORM_VERSION: '~> 1.9'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: write

# Deploy jobs only run in repos where BIFFO_DEPLOY_ENABLED=true has been set.
# The template repo itself has this unset, so all jobs are skipped there.

# ─── DEV ─────────────────────────────────────────────────────────────────────
# Runs automatically on push to main, or manually via workflow_dispatch.

jobs:
  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest
    environment: dev
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && (github.event_name == 'push' || github.event.inputs.environment == 'dev')
    defaults:
      run:
        working-directory: infra/environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "dev/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - run: terraform plan -no-color 2>&1 | tee plan.txt
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_admin_email: ${{ vars.BIFFO_ADMIN_EMAIL }}
          TF_VAR_admin_username: ${{ vars.BIFFO_ADMIN_USERNAME }}

  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    environment: dev
    needs: plan-dev
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.action == 'apply')
    defaults:
      run:
        working-directory: infra/environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "dev/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - run: terraform apply -auto-approve
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_admin_email: ${{ vars.BIFFO_ADMIN_EMAIL }}
          TF_VAR_admin_username: ${{ vars.BIFFO_ADMIN_USERNAME }}
      - name: Export outputs to GitHub Actions variables
        env:
          GH_TOKEN: ${{ secrets.BIFFO_GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh variable set API_GATEWAY_URL \
            --body "$(terraform output -raw api_gateway_url)" \
            --env dev
          gh variable set COGNITO_USER_POOL_ID \
            --body "$(terraform output -raw cognito_user_pool_id)" \
            --env dev
          gh variable set COGNITO_CLIENT_ID \
            --body "$(terraform output -raw cognito_client_id)" \
            --env dev
          gh variable set CORE_API_LAMBDA_NAME \
            --body "${{ vars.PROJECT_NAME }}-dev-core-api" \
            --env dev
          gh variable set PORTAL_BUCKET_NAME \
            --body "$(terraform output -raw portal_bucket_name)" \
            --env dev
          gh variable set CLOUDFRONT_DISTRIBUTION_ID \
            --body "$(terraform output -raw cloudfront_distribution_id)" \
            --env dev
          gh variable set PORTAL_URL \
            --body "$(terraform output -raw portal_url)" \
            --env dev

  # ─── STAGING ─────────────────────────────────────────────────────────────────
  # Manual only — run workflow_dispatch with environment=staging.
  # Requires staging environment approval in GitHub Settings → Environments.

  plan-staging:
    name: Plan (staging)
    runs-on: ubuntu-latest
    environment: staging
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.event.inputs.environment == 'staging'
    defaults:
      run:
        working-directory: infra/environments/staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "staging/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - run: terraform plan -no-color 2>&1 | tee plan.txt
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_admin_email: ${{ vars.BIFFO_ADMIN_EMAIL }}
          TF_VAR_admin_username: ${{ vars.BIFFO_ADMIN_USERNAME }}

  apply-staging:
    name: Apply (staging)
    runs-on: ubuntu-latest
    environment: staging
    needs: plan-staging
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.event.inputs.environment == 'staging' && github.event.inputs.action == 'apply'
    defaults:
      run:
        working-directory: infra/environments/staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "staging/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - run: terraform apply -auto-approve
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_admin_email: ${{ vars.BIFFO_ADMIN_EMAIL }}
          TF_VAR_admin_username: ${{ vars.BIFFO_ADMIN_USERNAME }}
      - name: Export outputs to GitHub Actions variables
        env:
          GH_TOKEN: ${{ secrets.BIFFO_GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh variable set API_GATEWAY_URL \
            --body "$(terraform output -raw api_gateway_url)" \
            --env staging
          gh variable set COGNITO_USER_POOL_ID \
            --body "$(terraform output -raw cognito_user_pool_id)" \
            --env staging
          gh variable set COGNITO_CLIENT_ID \
            --body "$(terraform output -raw cognito_client_id)" \
            --env staging
          gh variable set CORE_API_LAMBDA_NAME \
            --body "${{ vars.PROJECT_NAME }}-staging-core-api" \
            --env staging
          gh variable set PORTAL_BUCKET_NAME \
            --body "$(terraform output -raw portal_bucket_name)" \
            --env staging
          gh variable set CLOUDFRONT_DISTRIBUTION_ID \
            --body "$(terraform output -raw cloudfront_distribution_id)" \
            --env staging
          gh variable set PORTAL_URL \
            --body "$(terraform output -raw portal_url)" \
            --env staging

  # ─── PROD ────────────────────────────────────────────────────────────────────
  # Manual only — run workflow_dispatch with environment=prod.
  # Requires prod environment approval in GitHub Settings → Environments.

  plan-prod:
    name: Plan (prod)
    runs-on: ubuntu-latest
    environment: prod
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.event.inputs.environment == 'prod'
    defaults:
      run:
        working-directory: infra/environments/prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "prod/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - run: terraform plan -no-color 2>&1 | tee plan.txt
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_admin_email: ${{ vars.BIFFO_ADMIN_EMAIL }}
          TF_VAR_admin_username: ${{ vars.BIFFO_ADMIN_USERNAME }}

  apply-prod:
    name: Apply (prod)
    runs-on: ubuntu-latest
    environment: prod
    needs: plan-prod
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.event.inputs.environment == 'prod' && github.event.inputs.action == 'apply'
    defaults:
      run:
        working-directory: infra/environments/prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "prod/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - run: terraform apply -auto-approve
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_admin_email: ${{ vars.BIFFO_ADMIN_EMAIL }}
          TF_VAR_admin_username: ${{ vars.BIFFO_ADMIN_USERNAME }}
      - name: Export outputs to GitHub Actions variables
        env:
          GH_TOKEN: ${{ secrets.BIFFO_GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh variable set API_GATEWAY_URL \
            --body "$(terraform output -raw api_gateway_url)" \
            --env prod
          gh variable set COGNITO_USER_POOL_ID \
            --body "$(terraform output -raw cognito_user_pool_id)" \
            --env prod
          gh variable set COGNITO_CLIENT_ID \
            --body "$(terraform output -raw cognito_client_id)" \
            --env prod
          gh variable set CORE_API_LAMBDA_NAME \
            --body "${{ vars.PROJECT_NAME }}-prod-core-api" \
            --env prod
          gh variable set PORTAL_BUCKET_NAME \
            --body "$(terraform output -raw portal_bucket_name)" \
            --env prod
          gh variable set CLOUDFRONT_DISTRIBUTION_ID \
            --body "$(terraform output -raw cloudfront_distribution_id)" \
            --env prod
          gh variable set PORTAL_URL \
            --body "$(terraform output -raw portal_url)" \
            --env prod
