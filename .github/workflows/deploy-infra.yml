      - run: terraform init -backend-config=backend.hcl
      - run: terraform apply -auto-approve
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_admin_email: ${{ vars.BIFFO_ADMIN_EMAIL }}
          TF_VAR_admin_username: ${{ vars.BIFFO_ADMIN_USERNAME }}
          TF_VAR_domain: ${{ vars.DOMAIN }}
          TF_VAR_custom_domain: ${{ vars.CUSTOM_DOMAIN }}
          TF_VAR_acm_certificate_arn: ${{ vars.ACM_CERTIFICATE_ARN }}
      - name: Export outputs to GitHub Actions variables
        env:
          GH_TOKEN: ${{ secrets.BIFFO_GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh variable set API_GATEWAY_URL \
            --body "$(terraform output -raw api_gateway_url)" \
            --env prod
          gh variable set COGNITO_USER_POOL_ID \
            --body "$(terraform output -raw cognito_user_pool_id)" \
            --env prod
          gh variable set COGNITO_CLIENT_ID \
            --body "$(terraform output -raw cognito_client_id)" \
            --env prod
          gh variable set CORE_API_LAMBDA_NAME \
            --body "${{ vars.PROJECT_NAME }}-prod-core-api" \
            --env prod
          gh variable set PORTAL_BUCKET_NAME \
            --body "$(terraform output -raw portal_bucket_name)" \
            --env prod
          gh variable set CLOUDFRONT_DISTRIBUTION_ID \
            --body "$(terraform output -raw cloudfront_distribution_id)" \
            --env prod
          gh variable set PORTAL_URL \
            --body "$(terraform output -raw portal_url)" \
            --env prod
