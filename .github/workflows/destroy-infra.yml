      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "staging/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - name: Delete RDS proxy and instance before destroy
        run: |
          PREFIX="${{ vars.PROJECT_NAME }}-staging"
          PROXY="${PREFIX}-proxy"
          DB="${PREFIX}-postgres"
          if aws rds describe-db-proxies --db-proxy-name "$PROXY" --query 'DBProxies[0].Status' --output text 2>/dev/null | grep -qv None; then
            echo "Deleting RDS proxy: $PROXY"
            aws rds delete-db-proxy --db-proxy-name "$PROXY" 2>/dev/null || true
            for i in $(seq 1 30); do
              STATUS=$(aws rds describe-db-proxies --db-proxy-name "$PROXY" --query 'DBProxies[0].Status' --output text 2>/dev/null || echo "deleted")
              [ "$STATUS" = "deleted" ] || [ -z "$STATUS" ] || [ "$STATUS" = "None" ] && break
              echo "  Proxy status: $STATUS"; sleep 20
            done
          fi
          if aws rds describe-db-instances --db-instance-identifier "$DB" --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null | grep -qv None; then
            echo "Deleting RDS instance: $DB"
            aws rds delete-db-instance --db-instance-identifier "$DB" \
              --skip-final-snapshot --delete-automated-backups 2>/dev/null || true
            echo "Waiting for RDS deletion (up to 15 min)..."
            aws rds wait db-instance-deleted --db-instance-identifier "$DB" 2>/dev/null || true
          fi
      - name: Delete CloudWatch log groups
        run: |
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          PREFIX="${{ vars.PROJECT_NAME }}-staging"
          for LG in \
            "/biffo/${PREFIX}/vpc-flow-logs" \
            "/biffo/${PREFIX}/api-gateway" \
            "/biffo/${PREFIX}/events" \
            "/aws/lambda/${PREFIX}-core-api"; do
            aws logs delete-log-group --log-group-name "$LG" --region "$REGION" 2>/dev/null || true
          done
      - run: terraform destroy -auto-approve
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_admin_email: ${{ vars.BIFFO_ADMIN_EMAIL }}
          TF_VAR_admin_username: ${{ vars.BIFFO_ADMIN_USERNAME }}
          TF_VAR_domain: ${{ vars.DOMAIN }}
          TF_VAR_custom_domain: ${{ vars.CUSTOM_DOMAIN }}
          TF_VAR_acm_certificate_arn: ${{ vars.ACM_CERTIFICATE_ARN }}
          TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID }}
      - name: Verify no orphaned resources remain
        uses: ./.github/actions/verify-no-orphans
        with:
          environment: staging
          prefix: "${{ vars.PROJECT_NAME }}-staging"
          region: "${{ vars.AWS_REGION || 'us-east-1' }}"
          check_cognito: "true"
          check_vpc: "true"

  # ─── PROD ────────────────────────────────────────────────────────────────────
  # Requires prod environment approval in GitHub Settings → Environments.

  destroy-prod:
    name: Destroy (prod)
    runs-on: ubuntu-latest
    environment: prod
    if: vars.BIFFO_DEPLOY_ENABLED == 'true' && github.event.inputs.environment == 'prod'
    defaults:
      run:
        working-directory: infra/environments/prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BIFFO_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Generate backend config
        run: |
          cat > backend.hcl << 'EOF'
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          key    = "prod/terraform.tfstate"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
      - run: terraform init -backend-config=backend.hcl
      - name: Delete RDS proxy and instance before destroy
        run: |
          PREFIX="${{ vars.PROJECT_NAME }}-prod"
          PROXY="${PREFIX}-proxy"
          DB="${PREFIX}-postgres"
          if aws rds describe-db-proxies --db-proxy-name "$PROXY" --query 'DBProxies[0].Status' --output text 2>/dev/null | grep -qv None; then
            echo "Deleting RDS proxy: $PROXY"
            aws rds delete-db-proxy --db-proxy-name "$PROXY" 2>/dev/null || true
            for i in $(seq 1 30); do
              STATUS=$(aws rds describe-db-proxies --db-proxy-name "$PROXY" --query 'DBProxies[0].Status' --output text 2>/dev/null || echo "deleted")
              [ "$STATUS" = "deleted" ] || [ -z "$STATUS" ] || [ "$STATUS" = "None" ] && break
              echo "  Proxy status: $STATUS"; sleep 20
            done
          fi
          if aws rds describe-db-instances --db-instance-identifier "$DB" --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null | grep -qv None; then
            echo "Deleting RDS instance: $DB"
            aws rds delete-db-instance --db-instance-identifier "$DB" \
              --skip-final-snapshot --delete-automated-backups 2>/dev/null || true
            echo "Waiting for RDS deletion (up to 15 min)..."
            aws rds wait db-instance-deleted --db-instance-identifier "$DB" 2>/dev/null || true
          fi
      - name: Delete CloudWatch log groups
        run: |
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          PREFIX="${{ vars.PROJECT_NAME }}-prod"
          for LG in \
            "/biffo/${PREFIX}/vpc-flow-logs" \
