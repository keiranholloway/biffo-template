[project]
name = "biffo-plugin-sdk"
version = "0.1.0"
description = "Biffo Plugin SDK — manifest validation, client, and event system"
requires-python = ">=3.13"
dependencies = [
  "pydantic>=2.10.4",
  "httpx>=0.28.1",
]

[dependency-groups]
dev = [
  "pytest>=8.3.4",
  "pytest-asyncio>=0.25.2",
  "ruff>=0.8.0",
  "pyright>=1.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"